<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>ГБПОУ ВО БТПИТ УПК</title>
    <link href="css/style.css" rel="stylesheet">
    <link href="css/bootstrap.css" rel="stylesheet">

</head>
<body>
<!-- шапка -->
<section class="myColorHeader ">
    <nav class="navbar navbar-expand-lg d-flex justify-content-between align-items-center">
        <div class="container-fluid ">
            <!-- логотип упк -->
            <a class="navbar-brand " href="index.html">
                <img alt="Логотип" class="myImg" src="img/logo.png">
            </a>

            <!-- поиск -->
            <div class="mySearh d-flex align-items-center justify-content-around" style="flex-grow: 1;">
                <input aria-label="Поиск" class="form-control " placeholder="Поиск" style="height: 60px;" type="search">
                <div class="d-flex justify-content-end align-items-center">
                    <div class="">
                        <!-- выпадающий список -->
                        <div class="dropdown">
                            <button aria-expanded="false" class="btn dropdown-toggle" data-bs-toggle="dropdown"
                                    id="dropdownMenuButton1" type="button">
                                <img alt="Иконка группы" src="img/Group 2.png">
                            </button>
                            <ul aria-labelledby="dropdownMenuButton1" class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">Action</a></li>
                                <li><a class="dropdown-item" href="#">Another action</a></li>
                                <li><a class="dropdown-item" href="#">Something else here</a></li>
                            </ul>
                        </div>
                    </div>
                    <!-- иконки-->
                    <div class="myIcons">
                        <div class="d-flex me-3 myStyleTextLogo header-icons ">
                            <div class="mx-1 text-center">
                                <a href="#">
                                    <img alt="Иконка комментария" src="img/comment.png">
                                </a>
                            </div>
                            <div class="mx-1 text-center">
                                <a href="Login.html">
                                    <img alt="Иконка пользователя" src="img/user.png">
                                </a>
                            </div>
                            <div class="mx-1 text-center">
                                <a href="#">
                                    <img alt="Иконка сердца" src="img/heart.png">
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>
</section>

<!-- карточка оформления заказа -->
<section class="mx-4 myInfoCard catalog content">
    <div class=" mb-3">
        <div class="card-body text-center">
            <div class="m-5">
                <img alt="..." class="card-img-top w-50" src="img/Group 19.png">
            </div>
            <h3>Cheeseburger Wendy's Burger</h3>
            <h3>Исполнитель</h3>
            <h3>Номер телефона</h3>
            <h3>Адресс</h3>
            <h3>Цена</h3>
            <div>
                <textarea class="w-75 rounded-2 myGrey m-2 border-0" id="" name=""
                          placeholder="Вы хотите добавить комментарий к вашему заказу?" rows="7"></textarea>
            </div>
            <div class="d-flex m-2 justify-content-evenly">
                <button class="w-25 myButton rounded-4 myGrey text-black p-2 border-0">отмена</button>
                <button class="w-25 myButton rounded-4 myLightBlue text-white p-2 border-0" data-bs-target="#exampleModal"
                        data-bs-toggle="modal" type="button">оформить
                </button>
            </div>

        </div>

    </div>
</section>
<!-- ======================= ПОДВАЛ САЙТА ======================= -->
<footer class="px-3">
    <section class="d-flex justify-content-between catalog">
        <div class="d-flex">
            <img alt="Логотип" src="img/logo.png">
            <div class="align-self-center">
                <img alt="YPK" src="img/YPK.png">
            </div>
        </div>
        <div class="align-self-center text-center text-white">
            <p>Телефон: 8 (999) 999-99-99</p>
            <p>Email: gmail@gmail.com</p>
        </div>
    </section>
</footer>

<!-- ======================= НИЖНЯЯ НАВИГАЦИЯ (МОБИЛЬНАЯ ВЕРСИЯ) ======================= -->
<div class="mobile-bottom-nav">
    <div class="nav-icon text-center">
        <a href="#">
            <img alt="Комментарии" src="img/comment.png">
            <div>
                <span class="text-decoration-none text-white">Отзывы</span>
            </div>
        </a>
    </div>
    <div class="nav-icon text-center">
        <a href="Login.html">
            <img alt="Профиль" src="img/user.png">
            <div>
                <span class="text-decoration-none text-white">Профиль</span>
            </div>
        </a>
    </div>
    <div class="nav-icon text-center">
        <a href="#">
            <img alt="Избранное" src="img/heart.png">
            <div>
                <span class="text-decoration-none text-white">Избранное</span>
            </div>
        </a>
    </div>
</div>
<!-- Modal -->
<div aria-hidden="true" aria-labelledby="exampleModalLabel" class="modal fade" id="exampleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content ">
            <div class="modal-header d-flex justify-content-center mySearh">
                <img alt="" src="img/checkMark.png">
            </div>
            <div class="modal-body text-center catalog">
                <h1 class="myA">Успешно</h1>
                <p class="px-5 opacity-75">В ближайшее время вам позвонят для подтверждения заказа</p>
            </div>
            <div class="modal-footer d-flex justify-content-center mySearh">
                <a href="index.html">
                    <button class="btn btn-primary myButton rounded-4 myLightBlue text-white p-2 border-0"
                            type="button">Вернуться
                    </button>
                </a>
            </div>
        </div>
    </div>
</div>
<!-- Подключение скриптов Bootstrap -->
<script src="bootstrap/bootstrap.bundle.js"></script>

</body>
</html>
