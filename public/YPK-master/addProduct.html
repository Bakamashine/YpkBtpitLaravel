<!-- ======================= КАРТОЧКА созданич ТОВАРа  ======================= -->
<section class="mx-4 ">

                    <!-- Поля формы  -->

                        <div class="mb-3">

                            </select>
                        </div>

                        <div class="mb-3">
                            <textarea class="border-0 rounded-4  backColorGre1 w-100 px-3" placeholder="Доп инфа"
                                      rows="3"></textarea>
                        </div>

                        <!-- Переключатель Услуга / Товар -->
                        <div class="mb-4 d-flex justify-content-around gap-4">
                            <div class="form-check">
                                <input class="form-check-input  " id="service" name="offerType" type="radio"
                                       value="service">
                                <label class="form-check-label   text-muted" for="service">Услуга</label>
                            </div>
                            <div class="form-check">
                                <input checked class="form-check-input  " id="product" name="offerType"
                                       type="radio" value="product">
                                <label class="form-check-label  text-muted " for="product">Товар</label>
                            </div>
                        </div>
                    </div>


                    <!-- Кнопка Заказать -->

<!-- Подключение скриптов Bootstrap -->
<script src="bootstrap/bootstrap.bundle.js"></script>

<!-- Скрипт для фото -->
<script>
    // Находим элементы
    const uploadDiv = document.querySelector('.newFoto');
    const fileInput = document.getElementById('photoInput');
    const imgElement = uploadDiv.querySelector('img');

    // При клике на див открываем выбор файла
    uploadDiv.addEventListener('click', function () {
        fileInput.click();
    });

    // Когда файл выбран
    fileInput.addEventListener('change', function (e) {
        const file = e.target.files[0];

        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();

            reader.onload = function (event) {
                // Заменяем иконку на загруженное фото
                imgElement.src = event.target.result;
                imgElement.classList.add('w-100'); // Делаем фото на всю ширину
            };

            reader.readAsDataURL(file);
        }
    });
</script>
<!--  для модального окна -->
<div aria-hidden="true" aria-labelledby="exampleModalLabel" class="modal fade" id="exampleModal" tabindex="-1">
    <div class="modal-dialog">
